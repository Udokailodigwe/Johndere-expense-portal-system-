version: "3.9"

services:
  backend:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    command: npm start

  # frontend:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #   environment:
  #     - NODE_ENV=production
  #   depends_on:
  #     - backend
  #   #command: npm run build

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./client/build:/usr/share/nginx/html
    depends_on:
      - backend
